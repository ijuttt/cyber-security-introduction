<svg viewBox="0 0 960 750" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="960" height="750" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">3 Pilar Skillset Dasar Cybersecurity</text>
  <text x="480" y="62" text-anchor="middle" font-size="14" fill="#64748b">Makin banyak sisi yang dikuasai, makin luas jalur karier yang terbuka</text>

  <!-- Triangle edges (drawn first, behind circles) -->
  <line x1="480" y1="150" x2="170" y2="590" stroke="#94a3b8" stroke-width="3"/>
  <line x1="480" y1="150" x2="790" y2="590" stroke="#94a3b8" stroke-width="3"/>
  <line x1="170" y1="590" x2="790" y2="590" stroke="#94a3b8" stroke-width="3"/>

  <!-- Center box: all three combined -->
  <rect x="350" y="410" width="260" height="82" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="480" y="435" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">OS + Network + Programming</text>
  <text x="480" y="456" text-anchor="middle" font-size="12" fill="#5b21b6">→ Red Teamer / CTF Player</text>
  <text x="480" y="474" text-anchor="middle" font-size="12" fill="#5b21b6">→ Security Researcher</text>

  <!-- Edge label: OS + Network -->
  <rect x="205" y="326" width="230" height="72" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="320" y="348" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">OS + Network</text>
  <text x="320" y="367" text-anchor="middle" font-size="11" fill="#334155">→ SOC Analyst</text>
  <text x="320" y="384" text-anchor="middle" font-size="11" fill="#334155">→ Network Security Engineer</text>

  <!-- Edge label: OS + Programming -->
  <rect x="525" y="326" width="230" height="72" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="640" y="348" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">OS + Programming</text>
  <text x="640" y="367" text-anchor="middle" font-size="11" fill="#334155">→ Malware Analyst</text>
  <text x="640" y="384" text-anchor="middle" font-size="11" fill="#334155">→ Exploit Developer</text>

  <!-- Edge label: Network + Programming -->
  <rect x="350" y="556" width="260" height="72" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="578" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">Network + Programming</text>
  <text x="480" y="597" text-anchor="middle" font-size="11" fill="#334155">→ Web App Pentester</text>
  <text x="480" y="614" text-anchor="middle" font-size="11" fill="#334155">→ API Security Engineer</text>

  <!-- Vertex: OS (top) -->
  <circle cx="480" cy="150" r="62" fill="#1e40af"/>
  <text x="480" y="160" text-anchor="middle" font-size="30" font-weight="bold" fill="#ffffff">OS</text>
  <text x="480" y="234" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Operating System</text>
  <text x="480" y="253" text-anchor="middle" font-size="11.5" fill="#64748b">Linux • Windows • CLI</text>

  <!-- Vertex: Network (bottom-left) -->
  <circle cx="170" cy="590" r="62" fill="#047857"/>
  <text x="170" y="598" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">NET</text>
  <text x="170" y="675" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Network</text>
  <text x="170" y="694" text-anchor="middle" font-size="11.5" fill="#64748b">TCP/IP • Protokol • Firewall</text>

  <!-- Vertex: Programming (bottom-right) -->
  <circle cx="790" cy="590" r="62" fill="#b45309"/>
  <text x="790" y="598" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">&lt;/&gt;</text>
  <text x="790" y="675" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Programming/Scripting</text>
  <text x="790" y="694" text-anchor="middle" font-size="11.5" fill="#64748b">Python • Bash • C/C++ • Web</text>

  <!-- Caption -->
  <text x="480" y="725" text-anchor="middle" font-size="12" fill="#94a3b8">Gambar 2.1 — Segitiga kombinasi skillset dan jalur karier yang terbuka</text>
</svg>
